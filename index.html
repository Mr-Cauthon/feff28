<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEFF 28 · Diario di visione</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper2: #ede8dc;
    --gold: #c8923a;
    --gold-light: #e8c98a;
    --red: #9b2335;
    --muted: #7a6e60;
    --border: rgba(26,18,8,0.12);
    --card-bg: #ffffff;
    --header-bg: #1a1208;
    --nav-bg: #1a1208;
    --export-bg: #1a1208;
    --header-text: rgba(245,240,232,0.9);
    --header-muted: rgba(245,240,232,0.4);
  }
  :root.dark {
    --ink: #f0ece4;
    --paper: #1a1612;
    --paper2: #242018;
    --gold: #d4a054;
    --gold-light: #e8c98a;
    --red: #c0392b;
    --muted: #8a7e72;
    --border: rgba(240,236,228,0.1);
    --card-bg: #211e1a;
    --header-bg: #0f0d0a;
    --nav-bg: #0f0d0a;
    --export-bg: #0f0d0a;
    --header-text: rgba(245,240,232,0.9);
    --header-muted: rgba(245,240,232,0.4);
  }

  /* Dark mode ticket overrides */
  :root.dark .film-card.booked-card { background: #2a1a18; outline-color: #c0392b; }
  :root.dark .film-card.booked-card .film-body { background: #2a1a18; }
  :root.dark .film-card.booked-card .film-title { color: #f0ece4; }
  :root.dark .film-card.booked-card .film-time-col::before,
  :root.dark .film-card.booked-card .film-time-col::after { background: var(--paper); }
  :root.dark .film-card.booked-card.past-card { background: #1e1210; outline-color: #8b2a20; }
  :root.dark .film-card.booked-card.past-card .film-body { background: #1e1210; }
  :root.dark .film-card.booked-card.past-card .film-time-col::before,
  :root.dark .film-card.booked-card.past-card .film-time-col::after { background: var(--paper); border-color: #8b2a20; }
  :root.dark .film-card:not(.booked-card) { background: var(--card-bg); }
  :root.dark .note-area { background: var(--paper2); color: var(--ink); border-color: rgba(240,236,228,0.15); }
  :root.dark .film-synopsis-preview { border-top-color: rgba(240,236,228,0.1); }
  :root.dark .vote-chip { background: var(--paper2); }
  :root.dark .film-time-col { background: var(--paper2); border-right-color: rgba(240,236,228,0.08); }
  :root.dark .rank-row { border-bottom-color: rgba(240,236,228,0.08); background: transparent; }
  :root.dark .rank-row.gold { background: rgba(200,146,58,0.08); }
  :root.dark .rank-row.silver { background: rgba(170,170,170,0.05); }
  :root.dark .rank-row.bronze { background: rgba(176,112,64,0.05); }
  :root.dark .stat-card { background: var(--paper2); }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    transition: background 0.3s, color 0.3s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    background: var(--header-bg);
    color: #f0ece4;
    padding: 2rem 1.5rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--gold-light);
    font-style: italic;
  }

  .festival-dates {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
    font-weight: 400;
    white-space: nowrap;
  }

  /* Login bar */
  .login-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .login-bar input {
    background: rgba(245,240,232,0.1);
    border: 1px solid rgba(245,240,232,0.25);
    border-radius: 6px;
    color: var(--header-text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 6px 12px;
    outline: none;
    width: 160px;
    transition: border-color 0.2s;
  }
  .login-bar input::placeholder { color: rgba(245,240,232,0.35); }
  .login-bar input:focus { border-color: var(--gold-light); }

  .btn-confirm {
    background: var(--gold);
    border: none;
    border-radius: 6px;
    color: var(--ink);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .btn-confirm:hover { background: var(--gold-light); }

  .user-badge {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--gold-light);
  }
  .user-avatar { cursor: pointer; }
  .color-picker {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #1a1208;
    border: 1px solid rgba(245,240,232,0.15);
    border-radius: 10px;
    padding: 10px;
    gap: 8px;
    flex-wrap: wrap;
    width: 180px;
    z-index: 200;
    margin-top: 6px;
  }
  .color-picker.open { display: flex; }
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: #fff; }
  .color-picker-label {
    width: 100%;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    margin-bottom: 2px;
  }
  .user-badge.visible { display: flex; }
  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 500;
  }
  .btn-change {
    background: none; border: none;
    color: rgba(245,240,232,0.4);
    font-size: 0.7rem;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'DM Sans', sans-serif;
  }

  /* Sync status */
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #666;
    display: inline-block;
    margin-right: 4px;
    transition: background 0.4s;
  }
  .sync-dot.ok { background: #4caf50; }
  .sync-dot.err { background: var(--red); }
  .sync-dot.loading { background: var(--gold); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sync-label { font-size: 0.65rem; color: rgba(245,240,232,0.4); letter-spacing: 0.05em; }

  /* Config panel */
  .config-panel {
    background: rgba(200,146,58,0.08);
    border: 1px solid rgba(200,146,58,0.25);
    border-radius: 10px;
    margin: 1rem 1.5rem;
    padding: 1rem 1.25rem;
    font-size: 0.8rem;
    color: var(--muted);
    display: none;
  }
  .config-panel.visible { display: block; }
  .config-panel strong { color: var(--gold); }
  .config-panel input {
    display: block;
    width: 100%;
    margin-top: 0.5rem;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    background: white;
    outline: none;
  }
  .config-panel input:focus { border-color: var(--gold); }

  /* Day nav */
  .day-nav {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 0 1.5rem;
    background: var(--nav-bg);
    scrollbar-width: none;
    border-top: 1px solid rgba(240,236,228,0.08);
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 10px 14px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-tab:hover { color: var(--gold-light); }
  .tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #c0392b;
    color: #fff;
    font-size: 0.5rem;
    font-weight: 700;
    min-width: 14px;
    height: 14px;
    border-radius: 7px;
    padding: 0 4px;
    margin-left: 5px;
    vertical-align: middle;
    letter-spacing: 0;
  }
  .day-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
  .day-tab.tab-rank {
    color: var(--gold-light);
    font-weight: 500;
    letter-spacing: 0.1em;
    border-left: 1px solid rgba(245,240,232,0.12);
    margin-left: 6px;
    padding-left: 18px;
    background: rgba(200,146,58,0.12);
    border-radius: 4px 4px 0 0;
    position: relative;
  }

  .day-tab.tab-rank:hover { color: #fff; background: rgba(200,146,58,0.25); }
  .day-tab.tab-rank.active { color: #fff; background: var(--gold); border-bottom-color: var(--gold); }

  /* Next film banner */
  .next-film-bar {
    background: rgba(255,255,255,0.04);
    color: var(--paper);
    padding: 6px 1.5rem;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid rgba(245,240,232,0.08);
    overflow: hidden;
  }
  .next-film-bar.hidden { display: none; }
  .next-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; animation: pulse 1.5s infinite; }
  .next-label { color: rgba(245,240,232,0.45); letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.6rem; white-space: nowrap; flex-shrink: 0; }
  .next-title { color: var(--gold-light); font-weight: 500; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; max-width: 50%; }
  .next-time { color: rgba(245,240,232,0.5); flex-shrink: 0; white-space: nowrap; font-size: 0.65rem; margin-left: auto; }

  /* Content */
  main { padding: 0 0 4rem; }

  .day-section { display: none; padding: 1.25rem 1.5rem; }
  .day-section.active { display: block; }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }
  .day-subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  /* Film card */
  .film-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .film-card.booked-card { overflow: visible; }
  .film-card:hover { box-shadow: 0 2px 12px rgba(26,18,8,0.08); }

  .film-main {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  .film-time-col {
    background: var(--paper2);
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 56px;
    border-right: 1px solid var(--border);
  }
  .film-end {
    font-size: 0.55rem;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  .film-time {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .film-body {
    flex: 1;
    padding: 12px 14px;
  }

  .film-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .film-synopsis-preview {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.5;
    display: none;
    margin-bottom: 8px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .film-synopsis-preview.open { display: block; }

  .film-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 6px;
  }

  /* Stars */
  .stars { display: flex; gap: 2px; }
  .star {
    font-size: 1.1rem;
    cursor: pointer;
    color: #d4c9b0;
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
    padding: 2px;
    user-select: none;
  }
  .star:hover, .star.on { color: var(--gold); }
  .star:active { transform: scale(0.85); }

  /* Avatars row */
  .votes-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .vote-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    background: var(--paper2);
    border-radius: 20px;
    padding: 2px 7px 2px 3px;
    color: var(--muted);
  }
  .vote-chip-avatar {
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem;
    font-weight: 500;
    color: white;
  }
  .vote-chip-name { color: var(--ink); font-weight: 500; }
  .vote-chip-stars { color: var(--gold); letter-spacing: -1px; }

  .feff-link {
    display: block;
    margin-top: 8px;
    font-size: 0.65rem;
    color: var(--gold);
    text-decoration: none;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .feff-link:hover { text-decoration: underline; }

  .toggle-syn {
    background: none; border: none;
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
    white-space: nowrap;
  }

  /* Competition badge */
  .comp-badge {
    display: inline-block;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 3px;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .comp-badge.in { background: rgba(200,146,58,0.12); color: var(--gold); border: 1px solid rgba(200,146,58,0.3); }
  .comp-badge.out { background: var(--paper2); color: var(--muted); border: 1px solid var(--border); }

  /* Note save button */
  .note-save-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.6rem; color: var(--muted);
    cursor: pointer; padding: 3px 10px; margin-top: 4px;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0.05em;
    text-transform: uppercase; transition: all 0.2s;
  }
  .note-save-btn:hover { border-color: var(--gold); color: var(--gold); }
  .note-save-btn.saved { border-color: var(--gold); color: var(--gold); }

  /* Note privacy toggle */
  .note-header {
    display: flex; align-items: center; gap: 6px; margin-top: 8px; margin-bottom: 4px;
  }
  .note-label { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .note-privacy-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    font-size: 0.6rem; color: var(--muted); cursor: pointer; padding: 1px 6px;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.2s; white-space: nowrap;
  }
  .note-privacy-btn.public { border-color: var(--gold); color: var(--gold); background: rgba(200,146,58,0.06); }

  /* Booked toggle */
  .btn-book {
    background: none; border: none;
    cursor: pointer; padding: 3px 6px;
    font-size: 1.2rem; line-height: 1;
    color: rgba(26,18,8,0.18);
    transition: color 0.2s, background 0.2s;
    margin-left: auto;
    flex-shrink: 0;
    min-width: 32px;
    min-height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    border: 1px solid transparent;
  }
  .btn-book:hover { color: var(--muted); background: var(--paper2); border-color: var(--border); }
  .btn-book.booked { color: #4a7c6f; }
  @media (max-width: 480px) {
    .btn-book { font-size: 1.1rem; min-width: 28px; min-height: 28px; }
  }
  .film-card .book-badge {
    display: none;
    font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: #4a7c6f; font-weight: 500; margin-top: 3px;
  }
  /* Non-booked: faded */
  .film-card:not(.booked-card) { opacity: 0.55; }
  .film-card:not(.booked-card):hover { opacity: 1; transition: opacity 0.2s; }

  /* Past booked: only time column darkens */
  .film-card.booked-card.past-card .film-time-col { background: #8b2a20; }
  .film-card.booked-card.past-card .film-time { color: rgba(255,255,255,0.7); }
  .film-card.booked-card.past-card .film-end { color: rgba(255,255,255,0.45); }
  .film-card.booked-card.past-card .book-badge { opacity: 0.5; }
  .film-card.booked-card.past-card .serial-num { color: rgba(255,255,255,0.25); }
  .film-card.booked-card.past-card { opacity: 0.75; }

  /* Booked: ticket style */
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

  .film-card.booked-card {
    background: var(--card-bg);
    border: none;
    position: relative;
    border-radius: 0;
    margin-bottom: 18px;
    /* Dentellature top e bottom come biglietto classico */
    -webkit-mask-image:
      radial-gradient(circle at 50% 0%,   transparent 5px, black 6px),
      radial-gradient(circle at 50% 100%, transparent 5px, black 6px);
    -webkit-mask-size: 12px 100%;
    -webkit-mask-repeat: repeat-x;
    -webkit-mask-position: 0 0, 0 100%;
    mask-image:
      radial-gradient(circle at 50% 0%,   transparent 5px, black 6px),
      radial-gradient(circle at 50% 100%, transparent 5px, black 6px);
    mask-size: 12px 100%;
    mask-repeat: repeat-x;
    mask-position: 0 0, 0 100%;
    border: 2px solid #c0392b;
    border-left: none;
    border-right: none;
  }

  .film-card.booked-card .book-badge { display: block; }
  .film-card.booked-card .film-time-col {
    background: #c0392b;
    border-right: none;
    border-radius: 0;
    position: relative;
    overflow: visible;
  }
  .film-card.booked-card .film-time { color: #fff; font-weight: 700; }
  .film-card.booked-card .film-end  { color: rgba(255,255,255,0.75); }
  .film-card.booked-card .book-badge {
    color: rgba(255,255,255,0.9);
    font-size: 0.42rem;
    letter-spacing: 0.16em;
  }

  /* Perforazione separatore stub */
  .film-card.booked-card .film-main { position: relative; }
  .film-card.booked-card .film-main::after {
    content: '';
    position: absolute;
    left: 62px; top: 0; bottom: 0; width: 0;
    border-left: 2px dashed rgba(192,57,43,0.35);
    z-index: 1;
  }
  /* Semicerchi notch */
  .film-card.booked-card .film-time-col::before,
  .film-card.booked-card .film-time-col::after {
    content: '';
    position: absolute;
    right: -8px;
    width: 16px; height: 16px;
    background: var(--paper);
    border-radius: 50%;
    border: 2px solid #c0392b;
    z-index: 3;
  }
  .film-card.booked-card .film-time-col::before { top: -8px; }
  .film-card.booked-card .film-time-col::after  { bottom: -8px; }

  /* Numero seriale verticale — nella colonnina orario */
  .serial-num {
    display: none;
    font-size: 0.35rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
    font-family: 'Special Elite', 'DM Sans', sans-serif;
    white-space: nowrap;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    margin-top: 6px;
    pointer-events: none;
    overflow: hidden;
    max-height: 60px;
  }
  .film-card.booked-card .serial-num { display: block; }

  /* Timbro inline accanto a salva nota */
  .ticket-stamp {
    display: none;
    width: 52px; height: 52px;
    flex-shrink: 0;
    transform: rotate(-14deg);
    pointer-events: none;
    margin-left: auto;
  }
  .film-card.booked-card .ticket-stamp { display: inline-block; }
  .ticket-stamp svg { width: 100%; height: 100%; overflow: visible; }
  .note-footer {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Stats section */
  .stats-section { padding: 1.25rem 1.5rem; }

// Firebase REST helpers
async function fbGet(path) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`);
  if (!r.ok) throw new Error('Firebase GET failed: ' + r.status);
  return r.json();
}
async function fbSet(path, value) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(value)
  });
  if (!r.ok) throw new Error('Firebase PUT failed: ' + r.status);
  return r.json();
}
async function fbPatch(path, value) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(value)
  });
  if (!r.ok) throw new Error('Firebase PATCH failed: ' + r.status);
  return r.json();
}
async function fbDelete(path) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: 'DELETE'
  });
  if (!r.ok) throw new Error('Firebase DELETE failed: ' + r.status);
  return r.json();
}

const userColors = {}; // { name: hex }

function avatarColor(name) {
  if (userColors[name]) return userColors[name];
  let h = 0; for(let c of name) h += c.charCodeAt(0);
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

async function saveUserColor(name, color) {
  userColors[name] = color;
  localStorage.setItem('feff28_colors', JSON.stringify(userColors));
  try {
    await fbPatch(`settings`, { [name]: { color } });
  } catch(e) { console.error('saveUserColor error:', e); }
}

async function loadUserColors() {
  // Load from localStorage first
  const cached = localStorage.getItem('feff28_colors');
  if (cached) { try { Object.assign(userColors, JSON.parse(cached)); } catch(e){} }
  // Then sync from Firebase
  try {
    const data = await fbGet('settings');
    if (data) {
      for (const [name, val] of Object.entries(data)) {
        if (val?.color) userColors[name] = val.color;
      }
      localStorage.setItem('feff28_colors', JSON.stringify(userColors));
    }
  } catch(e) {}
}

let currentUser = localStorage.getItem('feff28_user') || '';

function filmKey(dayIdx, filmIdx) { return `d${dayIdx}_f${filmIdx}`; }

// ─── Sync ───────────────────────────────────────────
function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

async function loadVotes() {
  // Show cache immediately
  const cached = localStorage.getItem('feff28_votes_cache');
  if (cached) { try { allVotes = JSON.parse(cached); _prevVotes = JSON.parse(cached); renderAll(); buildNav(); } catch(e){} }
  setSyncStatus('loading','aggiornamento…');
  try {
    const data = await fbGet('votes');
    allVotes = data || {};
    localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
    setSyncStatus('ok','sincronizzato');
    renderAll();
    buildNav();
  } catch(e) {
    setSyncStatus('err','errore rete');
    console.error('loadVotes error:', e);
  }
}


async function saveFilmKey(filmKey, localData, prevData) {
  setSyncStatus('loading', 'salvataggio…');
  try {
    if (localData === null || Object.keys(localData).length === 0) {
      // Whole film key gone — delete it
      await fbDelete(`votes/${filmKey}`);
    } else {
      // Build patch: set new values, set null for deleted keys
      const patch = Object.assign({}, localData);
      if (prevData) {
        for (const k of Object.keys(prevData)) {
          if (!(k in localData)) patch[k] = null; // explicitly delete removed keys
        }
      }
      await fbPatch(`votes/${filmKey}`, patch);
    }
    setSyncStatus('ok', 'salvato');
  } catch(e) {
    setSyncStatus('err', 'errore salvataggio');
    console.error('saveFilmKey error:', e);
  }
}

// Cache previous state to detect deletions
let _prevVotes = {};

async function saveVotes(changedKey) {
  const prev = JSON.parse(JSON.stringify(_prevVotes));
  localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
  _prevVotes = JSON.parse(JSON.stringify(allVotes));
  if (changedKey !== undefined) {
    const filmData = allVotes[changedKey] || null;
    const prevData = prev[changedKey] || null;
    await saveFilmKey(changedKey, filmData, prevData);
  } else {
    setSyncStatus('loading', 'salvataggio…');
    try {
      await fbSet('votes', allVotes);
      setSyncStatus('ok', 'salvato');
    } catch(e) {
      setSyncStatus('err', 'errore salvataggio');
    }
  }
}

function refreshData() { loadVotes(); }

// ─── User ────────────────────────────────────────────
function setUser() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  currentUser = val;
  localStorage.setItem('feff28_user', val);
  showUserBadge();
  renderAll();
}
function changeUser() {
  currentUser = '';
  localStorage.removeItem('feff28_user');
  document.getElementById('userBadge').classList.remove('visible');
  document.getElementById('loginBar').style.display = 'flex';
  document.getElementById('nameInput').value = '';
}
function showUserBadge() {
  document.getElementById('loginBar').style.display = 'none';
  const badge = document.getElementById('userBadge');
  badge.classList.add('visible');
  document.getElementById('userAvatar').textContent = initials(currentUser);
  document.getElementById('userAvatar').style.background = avatarColor(currentUser);
  document.getElementById('userNameLabel').textContent = currentUser;
  renderColorPicker();
}

function renderColorPicker() {
  const picker = document.getElementById('colorPicker');
  if (!picker) return;
  const current = avatarColor(currentUser);
  picker.innerHTML = `<span class="color-picker-label">il tuo colore</span>` +
    AVATAR_COLORS.map(c => `<div class="color-swatch${c===current?' selected':''}" style="background:${c}" data-color="${c}"></div>`).join('');
}

function toggleColorPicker() {
  const picker = document.getElementById('colorPicker');
  if (!picker) return;
  picker.classList.toggle('open');
}

// Close picker on outside click
document.addEventListener('click', function(e) {
  const picker = document.getElementById('colorPicker');
  if (!picker) return;
  const swatch = e.target.closest('.color-swatch');
  if (swatch) {
    const color = swatch.dataset.color;
    saveUserColor(currentUser, color);
    document.getElementById('userAvatar').style.background = color;
    picker.classList.remove('open');
    renderColorPicker();
    renderAll();
    return;
  }
  if (!e.target.closest('#userBadge')) picker.classList.remove('open');
});

// ─── Rating ──────────────────────────────────────────
function rate(dayIdx, filmIdx, stars) {
  if (!currentUser) { showToast('Inserisci prima il tuo nome ↑'); return; }
  const key = filmKey(dayIdx, filmIdx);
  if (!allVotes[key]) allVotes[key] = {};
  const current = allVotes[key][currentUser] || 0;
  if (current === stars) {
    delete allVotes[key][currentUser];
    if (Object.keys(allVotes[key]).length === 0) delete allVotes[key];
  } else {
    allVotes[key][currentUser] = stars;
  }
  localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
  renderAll();
  saveVotes(key);
}

// ─── Event delegation (fixes iOS tap on re-rendered stars) ───
document.addEventListener('click', function(e) {
  if (e.target.closest('.btn-unseen')) return; // handled separately below
  const star = e.target.closest('[data-rate]');
  if (star) {
    rate(+star.dataset.day, +star.dataset.film, +star.dataset.rate);
    return;
  }
  const syn = e.target.closest('[data-syn]');
  if (syn) {
    toggleSyn(syn.dataset.syn);
  }
});

// ─── Render ───────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('dayNav');
  const dayTabs = films.map((d,i) => {
    let booked = 0;
    if (currentUser) {
      d.films.forEach((f, fi) => {
        const key = filmKey(i, fi);
        if (allVotes[key] && allVotes[key][`__book__${currentUser}`] === true) {
          // Only count if film hasn't ended yet
          const now = new Date();
          const festStart = new Date(2026, 3, 24);
          const festEnd   = new Date(2026, 4, 3);
          if (now < festStart || now >= festEnd) { booked++; return; }
          const dur = DURATIONS[f.title] || 120;
          const [h,m] = f.t.split(':').map(Number);
          const festDate = new Date(festStart.getTime() + i * 86400000);
          const end = new Date(festDate.getFullYear(), festDate.getMonth(), festDate.getDate(), h, m + dur);
          if (now <= end) booked++;
        }
      });
    }
    const badge = booked > 0 ? `<span class="tab-badge">${booked}</span>` : '';
    return `<div class="day-tab ${i===0?'active':''}" onclick="switchDay(${i})">${d.label}${badge}</div>`;

  nav.innerHTML = dayTabs + `<div class="day-tab tab-rank" onclick="switchDay(${films.length})">Classifica</div>` + `<div class="day-tab" onclick="switchDay(${films.length}+1)">Le mie stats</div>`;
}

function renderRanking(container) {
  // Build ranked list from allVotes
  const ranked = [];
  films.forEach((day, di) => {
    day.films.forEach((f, fi) => {
      const key = filmKey(di, fi);
      const votes = allVotes[key] ? Object.values(allVotes[key]).filter(v => typeof v === 'number') : [];
      if (votes.length === 0) return;
      const avg = votes.reduce((a,b) => a+b, 0) / votes.length;
      ranked.push({ title: f.title, day: day.day, avg, count: votes.length });
    });
  });
  ranked.sort((a,b) => b.avg - a.avg || b.count - a.count);

  if (ranked.length === 0) {
    container.innerHTML = `
      <div class="rank-title">Classifica</div>
      <div class="rank-subtitle">Media voti · aggiornamento in tempo reale</div>
      <div class="rank-empty">Nessun voto ancora — inizia a votare!</div>`;
    return;
  }

  const medals = ['gold','silver','bronze'];
  const rows = ranked.map((r,i) => {
    const cls = medals[i] || '';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const barW = Math.round((r.avg/5)*100);
    return `<div class="rank-row ${cls}">
      <div class="rank-pos">${medal}</div>
      <div class="rank-info">
        <div class="rank-film">${r.title}</div>
        <div class="rank-day">${r.day}</div>
      </div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${barW}%"></div></div>
      <div class="rank-score">
        <div class="rank-avg">${r.avg.toFixed(1)}</div>
        <div class="rank-count">${r.count} vot${r.count===1?'o':'i'}</div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="rank-title">Classifica</div>
    <div class="rank-subtitle">Media voti · ${ranked.length} film votati</div>
    ${rows}`;
}

// ─── Prossimo film + countdown WEAS ──────────────────
function formatCountdown(ms) {
  if (ms <= 0) return null;
  const totalMin = Math.floor(ms / 60000);
  const days = Math.floor(totalMin / 1440);
  const hrs  = Math.floor((totalMin % 1440) / 60);
  const mins = totalMin % 60;
  if (days > 0) return `${days}g ${hrs}h ${String(mins).padStart(2,'0')}m`;
  if (hrs > 0)  return `${hrs}h ${String(mins).padStart(2,'0')}m`;
  return `${mins} min`;
}

function updateNextFilm() {
  const bar = document.getElementById('nextFilmBar');
  const titleEl = document.getElementById('nextFilmTitle');
  const timeEl = document.getElementById('nextFilmTime');
  if (!bar) return;
  const now = new Date();
  const festStart = new Date(2026, 3, 24);
  const festEnd   = new Date(2026, 4, 3);

  // After festival: hide
  if (now >= festEnd) { bar.classList.add('hidden'); return; }

  // Scan ALL festival days looking for next upcoming film (booked preferred)
  let booked = null, any = null;

  for (let di = 0; di < films.length; di++) {
    const festDate = new Date(2026, 3, 24 + di); // Apr 24 + di days
    for (let fi = 0; fi < films[di].films.length; fi++) {
      const f = films[di].films[fi];
      const [h,m] = f.t.split(':').map(Number);
      const filmTime = new Date(festDate.getFullYear(), festDate.getMonth(), festDate.getDate(), h, m);
      if (filmTime <= now) continue; // already started or passed

      const diffMs = filmTime - now;
      const diffMin = Math.round(diffMs / 60000);
      const diffStr = diffMin < 60
        ? `tra ${diffMin} min`
        : diffMin < 1440
          ? `tra ${Math.floor(diffMin/60)}h${String(diffMin%60).padStart(2,'0')}`
          : formatCountdown(diffMs);

      const dayLabel = films[di].label;
      const candidate = { title: f.title, start: f.t, day: dayLabel, diff: diffStr, sameDay: di === Math.floor((now - festStart) / 86400000) };

      if (!any) any = candidate;

      if (!booked && currentUser) {
        const key = filmKey(di, fi);
        if (allVotes[key] && allVotes[key][`__book__${currentUser}`] === true) booked = candidate;
      }

      // Once we have both candidates stop scanning this day
      if (any && (booked || !currentUser)) break;
    }
    // If we found what we need stop scanning days
    if (any && (booked || !currentUser)) break;
  }

  const found = booked || any;
  const isBooked = !!booked && found === booked;

  if (found) {
    bar.classList.remove('hidden');
    titleEl.textContent = (isBooked ? '🎟 ' : '') + found.title;
    timeEl.textContent = found.diff;
  } else {
    bar.classList.add('hidden');
  }
}

document.addEventListener('click', function(e) {
  const btn = e.target.closest('.note-save-btn');
  if (!btn) return;
  e.stopPropagation();
  if (!currentUser) return;
  const di = +btn.dataset.nday, fi = +btn.dataset.nfilm;
  const key = filmKey(di, fi);
  // Find the textarea in the same card
  const card = btn.closest('.film-body');
  const ta = card ? card.querySelector('.note-area') : null;
  if (!ta) return;
  const text = ta.value;
  const isPublic = ta.dataset.ispublic === '1';
  if (isPublic) {
    if (!allVotes[key]) allVotes[key] = {};
    // public is default — no flag needed
    if (text) allVotes[key][`__note__${currentUser}`] = text;
    else { delete allVotes[key][`__note__${currentUser}`]; }
    localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
    saveVotes();
  } else {
    if (text) localStorage.setItem(ta.dataset.notekey, text);
    else localStorage.removeItem(ta.dataset.notekey);
    // Extra safety: ensure nothing leaks to JSONBin
    if (allVotes[key]) {
      delete allVotes[key][`__note__${currentUser}`];
      if (!Object.keys(allVotes[key]).length) delete allVotes[key];
      localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
      saveVotes();
    }
  }
  btn.textContent = '✓ salvato';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'salva nota'; btn.classList.remove('saved'); }, 2000);
});

document.addEventListener('click', function(e) {
  const btn = e.target.closest('.note-privacy-btn');
  if (!btn) return;
  e.stopPropagation();
  if (!currentUser) return;
  const di = btn.dataset.nday, fi = btn.dataset.nfilm;
  const key = filmKey(+di, +fi);
  const privKey = `feff28_notepub_${currentUser}_${key}`;
  const noteKey = `feff28_note_${currentUser}_${key}`;
  const wasPublic = localStorage.getItem(privKey) === '1';
  const newPublic = !wasPublic;
  localStorage.setItem(privKey, newPublic ? '1' : '0');
  if (!allVotes[key]) allVotes[key] = {};
  if (newPublic) {
    // moving private→public: remove private flag, migrate text to allVotes
    delete allVotes[key][`__notepub__${currentUser}`];
    const localText = localStorage.getItem(noteKey) || '';
    if (localText) allVotes[key][`__note__${currentUser}`] = localText;
    if (!Object.keys(allVotes[key]).length) delete allVotes[key];
  } else {
    // moving public→private: set flag to false, migrate text to localStorage, WIPE from allVotes
    allVotes[key][`__notepub__${currentUser}`] = false;
    const remoteText = allVotes[key][`__note__${currentUser}`] || '';
    if (remoteText) localStorage.setItem(noteKey, remoteText);
    delete allVotes[key][`__note__${currentUser}`]; // ensures nothing remains on JSONBin
  }
  localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
  saveVotes();
  renderAll();
});

// ─── Stats ────────────────────────────────────────────
function getPersonStats(name) {
  const totalFilms = films.reduce((a,d) => a + d.films.length, 0);
  let voted = 0, ratingSum = 0, unseen = 0;
  let bestR = 0, bestTitles = [];
  const byDay = films.map((day, di) => {
    let dayVoted = 0, daySum = 0;
    day.films.forEach((f, fi) => {
      const key = filmKey(di, fi);
      const val = allVotes[key] ? allVotes[key][name] : undefined;
      if (typeof val !== 'number') return;
      const r = val || 0;
      if (r > 0) {
        voted++; ratingSum += r;
        dayVoted++; daySum += r;
        if (r > bestR) { bestR = r; bestTitles = [f.title]; }
        else if (r === bestR) { bestTitles.push(f.title); }
      }
    });
    return { label: day.label, voted: dayVoted, total: day.films.length, avg: dayVoted > 0 ? daySum/dayVoted : null };
  });
  const avg = voted > 0 ? ratingSum / voted : null;
  const pct = Math.round((voted / totalFilms) * 100);
  return { name, voted, totalFilms, avg, pct, byDay, bestTitles, bestR };
}

    });
  }));
  // current user always first if present
  const voters = currentUser
    ? [currentUser, ...[...voterSet].filter(n => n !== currentUser)]
    : [...voterSet];

  if (voters.length === 0) {
    container.innerHTML = `<div class="stats-title">Stats</div><div class="stats-empty">Nessun voto ancora.</div>`;
    return;

  const stats = voters.map(getPersonStats);

  const rowPct   = stats.map(s => `<td style="text-align:center;">

      <div class="stats-bar-wrap"><div class="stats-bar" style="width:${s.pct}%"></div></div>

    </div></td>`).join('');
  const rowAvg   = stats.map(s => `<td style="text-align:center;font-family:'Playfair Display',serif;font-size:1rem;">${s.avg ? s.avg.toFixed(1) : '—'}</td>`).join('');

      const d = s.byDay[di];
      return `<td style="text-align:center;">${d.voted > 0 ? `${d.voted}/<span style="color:var(--muted)">${d.total}</span>` : '<span style="color:var(--muted)">·</span>'}</td>`;
    }).join('');
    return `<tr><td style="color:var(--muted);font-size:0.65rem;white-space:nowrap;padding-right:16px;">${day.label}</td>${cols}</tr>`;
  }).join('');

  const colW = Math.max(52, Math.floor(200 / stats.length));

  container.innerHTML = `
    <div class="stats-title">Stats</div>
    <div class="stats-subtitle">Confronto · ${voters.length} partecipant${voters.length===1?'e':'i'}</div>

    <table class="stats-day-table" style="width:auto;table-layout:auto;">
      <thead>
        <tr>
          <th style="min-width:70px;"></th>

      </thead>
      <tbody>
        <tr><td style="color:var(--muted);font-size:0.65rem;">Film votati</td>${rowVoted}</tr>

      const othersStr = others.length ? ' | ' + others.map(([n,s])=>`${n.split(' ')[0]} ${'★'.repeat(s)}`).join(', ') : '';
      // Note: prefer public (JSONBin) over private (localStorage)
      const remoteNote = votes[`__note__${currentUser}`] || '';
      const localNote = currentUser ? (localStorage.getItem(`feff28_note_${currentUser}_${key}`) || '') : '';
      const note = remoteNote || localNote;
      txt += `${f.t}  ${f.title}  ${myStars}${othersStr}\n`;
      if (note) txt += `    ✏ ${note}\n`;
    });
    txt += '\n';
  });
  navigator.clipboard.writeText(txt).then(() => showToast('Copiato negli appunti ✓'));
}

function exportCSV() {
  // Collect all voter names
  const voters = new Set();
  films.forEach((day, di) => day.films.forEach((f, fi) => {
    Object.entries(allVotes[filmKey(di,fi)] || {}).forEach(([n,v]) => {
      if (typeof v === 'number') voters.add(n); // only real voters, no internal keys
    });
  }));
  const voterList = [...voters];

  const esc = v => `"${String(v).replace(/"/g,'""')}"`;
  const header = ['Giorno','Orario','Film', ...voterList.map(n => `Voto ${n}`)].map(esc).join(',');
  const rows = [];
  films.forEach((day, di) => {
    day.films.forEach((f, fi) => {
      const key = filmKey(di, fi);
      const votes = allVotes[key] || {};
      const votesCols = voterList.map(n => typeof votes[n] === 'number' ? votes[n] : '');
      rows.push([day.day, f.t, f.title, ...votesCols].map(esc).join(','));
    });
  });
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'feff28_voti.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV scaricato ✓');
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Dark mode ───────────────────────────────────────
function toggleDark() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('feff28_dark', isDark ? '1' : '0');
  document.getElementById('darkToggle').textContent = isDark ? '☾' : '☀';
}

// Firebase configured — no notice needed
if (localStorage.getItem('feff28_dark') === '1') {
  document.documentElement.classList.add('dark');
  document.getElementById('darkToggle').textContent = '☾';
}
if (currentUser) showUserBadge();
buildNav();
renderAll();
loadVotes();
loadUserColors().then(() => { renderAll(); if(currentUser) showUserBadge(); });
updateNextFilm();
setInterval(() => { updateNextFilm(); buildNav(); }, 60000);
</script>
