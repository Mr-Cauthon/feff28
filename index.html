<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEFF 28 · Diario di visione</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper2: #ede8dc;
    --gold: #c8923a;
    --gold-light: #e8c98a;
    --red: #9b2335;
    --muted: #7a6e60;
    --border: rgba(26,18,8,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2rem 1.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--gold-light);
    font-style: italic;
  }

  .festival-dates {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
    font-weight: 400;
    white-space: nowrap;
  }

  /* Login bar */
  .login-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .login-bar input {
    background: rgba(245,240,232,0.1);
    border: 1px solid rgba(245,240,232,0.25);
    border-radius: 6px;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 6px 12px;
    outline: none;
    width: 160px;
    transition: border-color 0.2s;
  }
  .login-bar input::placeholder { color: rgba(245,240,232,0.35); }
  .login-bar input:focus { border-color: var(--gold-light); }

  .btn-confirm {
    background: var(--gold);
    border: none;
    border-radius: 6px;
    color: var(--ink);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .btn-confirm:hover { background: var(--gold-light); }

  .user-badge {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--gold-light);
  }
  .user-badge.visible { display: flex; }
  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 500;
  }
  .btn-change {
    background: none; border: none;
    color: rgba(245,240,232,0.4);
    font-size: 0.7rem;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'DM Sans', sans-serif;
  }

  /* Sync status */
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #666;
    display: inline-block;
    margin-right: 4px;
    transition: background 0.4s;
  }
  .sync-dot.ok { background: #4caf50; }
  .sync-dot.err { background: var(--red); }
  .sync-dot.loading { background: var(--gold); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sync-label { font-size: 0.65rem; color: rgba(245,240,232,0.4); letter-spacing: 0.05em; }

  /* Config panel */
  .config-panel {
    background: rgba(200,146,58,0.08);
    border: 1px solid rgba(200,146,58,0.25);
    border-radius: 10px;
    margin: 1rem 1.5rem;
    padding: 1rem 1.25rem;
    font-size: 0.8rem;
    color: var(--muted);
    display: none;
  }
  .config-panel.visible { display: block; }
  .config-panel strong { color: var(--gold); }
  .config-panel input {
    display: block;
    width: 100%;
    margin-top: 0.5rem;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    background: white;
    outline: none;
  }
  .config-panel input:focus { border-color: var(--gold); }

  /* Day nav */
  .day-nav {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 0 1.5rem;
    background: var(--ink);
    scrollbar-width: none;
    border-top: 1px solid rgba(245,240,232,0.08);
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 10px 14px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-tab:hover { color: var(--gold-light); }
  .day-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }

  /* Content */
  main { padding: 0 0 4rem; }

  .day-section { display: none; padding: 1.25rem 1.5rem; }
  .day-section.active { display: block; }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }
  .day-subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  /* Film card */
  .film-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: white;
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .film-card:hover { box-shadow: 0 2px 12px rgba(26,18,8,0.08); }

  .film-main {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  .film-time-col {
    background: var(--paper2);
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 56px;
    border-right: 1px solid var(--border);
  }
  .film-time {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .film-body {
    flex: 1;
    padding: 12px 14px;
  }

  .film-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .film-synopsis-preview {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.5;
    display: none;
    margin-bottom: 8px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .film-synopsis-preview.open { display: block; }

  .film-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 6px;
  }

  /* Stars */
  .stars { display: flex; gap: 2px; }
  .star {
    font-size: 1.1rem;
    cursor: pointer;
    color: #d4c9b0;
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
    padding: 2px;
    user-select: none;
  }
  .star:hover, .star.on { color: var(--gold); }
  .star:active { transform: scale(0.85); }

  /* Avatars row */
  .votes-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .vote-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    background: var(--paper2);
    border-radius: 20px;
    padding: 2px 7px 2px 3px;
    color: var(--muted);
  }
  .vote-chip-avatar {
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem;
    font-weight: 500;
    color: white;
  }
  .vote-chip-name { color: var(--ink); font-weight: 500; }
  .vote-chip-stars { color: var(--gold); letter-spacing: -1px; }

  .toggle-syn {
    background: none; border: none;
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
    white-space: nowrap;
  }

  /* Personal note */
  .note-area {
    width: 100%;
    margin-top: 8px;
    padding: 7px 10px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--ink);
    resize: none;
    outline: none;
    min-height: 52px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .note-area:focus { border-color: var(--gold); border-style: solid; }
  .note-area::placeholder { color: var(--muted); font-style: italic; }
  .note-label {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
    display: block;
  }

  /* Export */
  .export-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--ink);
    padding: 12px 1.5rem;
    display: flex;
    gap: 10px;
    z-index: 99;
  }
  .btn-export {
    flex: 1;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: var(--ink);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 11px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .btn-export:hover { background: var(--gold-light); }
  .btn-export.secondary {
    background: rgba(245,240,232,0.08);
    color: var(--paper);
    flex: 0 0 auto;
    padding: 11px 16px;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  /* ─── Mobile optimizations ─────────────────────── */
  @media (max-width: 480px) {
    header {
      padding: 1rem 1rem 0.75rem;
    }
    .header-top {
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }
    header h1 {
      font-size: 1.25rem;
    }
    .festival-dates {
      font-size: 0.6rem;
    }
    .login-bar input {
      font-size: 16px; /* prevents iOS auto-zoom */
      width: 140px;
      padding: 8px 12px;
    }
    .btn-confirm {
      padding: 8px 14px;
      font-size: 0.75rem;
    }
    .day-tab {
      padding: 14px 12px; /* min 44px touch target */
      font-size: 0.65rem;
    }
    .day-section {
      padding: 1rem 0.875rem;
    }
    .film-time-col {
      min-width: 52px;
      padding: 12px 8px;
    }
    .film-time {
      font-size: 0.9rem;
    }
    .film-body {
      padding: 10px 10px;
    }
    .film-title {
      font-size: 0.8rem;
    }
    .star {
      font-size: 1.4rem;   /* bigger tap target */
      padding: 4px 3px;
    }
    .toggle-syn {
      font-size: 0.7rem;
      padding: 4px 0;
    }
    .film-synopsis-preview {
      font-size: 0.75rem;
    }
    .export-bar {
      padding: 10px 1rem;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    .btn-export {
      font-size: 0.72rem;
      padding: 13px 10px;
    }
    main {
      padding-bottom: calc(5rem + env(safe-area-inset-bottom));
    }
    .vote-chip {
      font-size: 0.68rem;
      padding: 3px 8px 3px 4px;
    }
    .vote-chip-avatar {
      width: 18px; height: 18px;
      font-size: 0.6rem;
    }
  }

  /* Config notice */
  .notice {
    margin: 1.5rem;
    padding: 1rem 1.25rem;
    background: rgba(155,35,53,0.06);
    border: 1px solid rgba(155,35,53,0.2);
    border-radius: 10px;
    font-size: 0.8rem;
    color: var(--red);
    line-height: 1.6;
    display: none;
  }
  .notice.visible { display: block; }
  .notice code {
    background: rgba(155,35,53,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>FEFF <span>28</span><br>Diario di visione</h1>
    <div style="text-align:right">
      <div class="festival-dates">Udine · 24 apr–2 mag 2026</div>
      <div style="margin-top:6px">
        <span class="sync-dot" id="syncDot"></span>
        <span class="sync-label" id="syncLabel">—</span>
      </div>
    </div>
  </div>
  <div class="login-bar" id="loginBar">
    <input type="text" id="nameInput" placeholder="Il tuo nome..." maxlength="20">
    <button class="btn-confirm" onclick="setUser()">Entra</button>
  </div>
  <div class="user-badge" id="userBadge">
    <div class="user-avatar" id="userAvatar"></div>
    <span id="userNameLabel"></span>
    <button class="btn-change" onclick="changeUser()">cambia</button>
  </div>
</header>

<div class="notice" id="configNotice">
  ⚠️ <strong>Configurazione richiesta:</strong> per attivare la sincronizzazione, apri questo file in un editor di testo e sostituisci <code>JSONBIN_API_KEY</code> e <code>JSONBIN_BIN_ID</code> con i tuoi valori da <strong>jsonbin.io</strong>. Le istruzioni complete sono nel README del repository.
</div>

<nav class="day-nav" id="dayNav"></nav>

<main id="main"></main>

<div class="export-bar">
  <button class="btn-export" onclick="exportText()">Esporta testo</button>
  <button class="btn-export" onclick="exportCSV()" style="background:var(--paper2);color:var(--ink);">Esporta CSV</button>
  <button class="btn-export secondary" onclick="refreshData()">↻</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIGURAZIONE — sostituisci questi valori
// ═══════════════════════════════════════════════════
const JSONBIN_API_KEY = 'JSONBIN_API_KEY';   // es. $2a$10$...
const JSONBIN_BIN_ID  = 'JSONBIN_BIN_ID';    // es. 664abc123...
// ═══════════════════════════════════════════════════

const BASE_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
const HEADERS = {
  'Content-Type': 'application/json',
  'X-Master-Key': JSONBIN_API_KEY,
  'X-Bin-Versioning': 'false'
};

const AVATAR_COLORS = ['#c8923a','#9b2335','#4a7c6f','#5c4a8f','#2e6da4','#7a6e60'];
function avatarColor(name) {
  let h = 0; for(let c of name) h += c.charCodeAt(0);
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) {
  return name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
}

const films = [
  { day:"Ven 24 Apr", label:"Ven 24/4", films:[
    {t:"14:00",title:"HULA GIRLS",syn:"Giappone 2006 (classico restaurato). In un villaggio minerario del Tohoku in crisi, giovani donne si allenano per diventare ballerine di hula per salvare la comunità trasformando la miniera in un parco termale. Dramma commovente ispirato a una storia vera, di Lee Sang-il."},
    {t:"16:20",title:"UNDER THE OPEN SKY",syn:"Giappone 2020 (Nishikawa Miwa). Un ex yakuza scarcerato dopo quindici anni tenta di reinserirsi nella società. Fuori concorso, nella retrospettiva dedicata a Koji Yakusho."},
    {t:"19:15",title:"WE ARE ALL STRANGERS",syn:"Singapore 2026 (Anthony Chen). Film d'apertura FEFF28. Due matrimoni mettono in crisi le vite parallele di un padre e un figlio, ridisegnando il fragile equilibrio tra loro mentre entrambi affrontano amore, perdita e responsabilità. Primo film singaporiano in competizione al Festival di Berlino."},
    {t:"22:30",title:"KUNG FU",syn:"Taiwan 2026 (Giddens Ko). Una dichiarazione d'amore folle e spettacolare al cinema wuxia. Prima internazionale al festival."}
  ]},
  { day:"Sab 25 Apr", label:"Sab 25/4", films:[
    {t:"09:00",title:"THE SNOWBALL ON A SUNNY DAY",syn:"Hong Kong 2026 (Philip Yung). Commedia scombinata in stile familiare, con toni brillanti e situazioni impreviste che si moltiplicano come una palla di neve."},
    {t:"11:20",title:"AH GIRL",syn:"Singapore 2026 (Ang Geck Priscilla). I bambini osservano il mondo degli adulti con occhi impietosi. Dramma intimo su famiglia e infanzia nella Singapore contemporanea."},
    {t:"14:00",title:"5 CENTIMETERS PER SECOND",syn:"Giappone 2025 (Okuyama Yoshiyuki). Attenzione: non è il film di Shinkai del 2007 — è un nuovo film omonimo. Un appuntamento attraverso il tempo, un dramma sulle distanze e i momenti mancati."},
    {t:"16:15",title:"WE'RE NOTHING AT ALL",syn:"Hong Kong 2026 (Herman Yau). Una tragedia su un attentato esplosivo portata al punto di ebollizione. Dramma ad alta tensione con risvolti sociali."},
    {t:"19:00",title:"PERFECT DAYS",syn:"Giappone/Germania 2023 (Wim Wenders). Hirayama, addetto alle pulizie dei bagni pubblici di Tokyo, conduce una vita di quieta routine e profonda attenzione ai piccoli piaceri. Fuori concorso, nella retrospettiva dedicata a Koji Yakusho, vincitore del premio come migliore attore a Cannes 2023."},
    {t:"21:40",title:"GHOST IN THE CELL",syn:"Indonesia 2026 (Joko Anwar). Arte e fantasmi si incontrano in un carcere. Il regista di Impetigore esplora il soprannaturale in un contesto claustrofobico e opprimente."},
    {t:"23:40",title:"THA RAE: THE EXORCIST",syn:"Thailandia 2025 (Taweewat Wantha). Un'alleanza di esorcisti affronta forze oscure in un villaggio rurale tailandese. Horror soprannaturale radicato nel folklore locale."}
  ]},
  { day:"Dom 26 Apr", label:"Dom 26/4", films:[
    {t:"09:00",title:"LINKA LINKA",syn:"Cina 2025 (Kangdrun). Un ritorno a casa tibetano: viaggio tra tradizione, paesaggi e memoria in un film che esplora l'identità culturale della regione himalayana."},
    {t:"11:00",title:"FUJIKO",syn:"Giappone 2026 (Kimura Taichi). Prima mondiale. Dramma onirico sull'emancipazione femminile, con Megumi (cantante e attrice) protagonista. Una storia di potere e identità al femminile."},
    {t:"14:00",title:"I BLEW OUT THE CANDLES BEFORE MAKING A WISH",syn:"Taiwan 2026 (Chao Koi-wang, Hu Chin-yen). Prima mondiale. Una fuga a Macao diventa il pretesto per un thriller familiare ricco di colpi di scena, tra bugie e segreti da svelare."},
    {t:"16:10",title:"KOKUHO",syn:"Giappone 2025 (Lee Sang-il). Due vite sul palcoscenico del teatro kabuki: un dramma raffinato sull'arte, l'identità e la tradizione. Fuori concorso, special screening."},
    {t:"19:20",title:"A FOGGY TALE",syn:"Taiwan 2025 (Chen Yu-hsun). Un'amicizia in un'epoca di terrore: ambientato probabilmente nel periodo del Terrore Bianco taiwanese, un racconto storico sull'amicizia e la sopravvivenza."},
    {t:"21:50",title:"HIJACKED",syn:"Vietnam 2025 (Ham Tran). Azione ad alta quota e ad alta tensione: un dirottamento aereo raccontato con ritmo frenetico. Thriller d'azione vietnamita."}
  ]},
  { day:"Lun 27 Apr", label:"Lun 27/4", films:[
    {t:"08:30",title:"NIGHT KING",syn:"Hong Kong 2026 (Jack Ng). Un meraviglioso affresco sulla vita notturna vintage di Hong Kong. Dramma nostalgico sull'underground urbano e i suoi protagonisti."},
    {t:"10:55",title:"SOMEONE LIKE ME",syn:"Hong Kong 2025 (Tam Wai-ching). Sessualità e disabilità al centro di un racconto delicato e coraggioso. Un film che sfida i pregiudizi con umanità e sensibilità."},
    {t:"13:00",title:"FILIPIÑANA",syn:"Filippine 2026 (Rafael Manuel). Un balletto astratto: film sperimentale e visivamente audace sull'identità filippina, tra danza, corpo e politica."},
    {t:"15:00",title:"THE WORLD OF LOVE",syn:"Corea del Sud 2025 (Yoon Ga-eun). Cicatrici segrete: un dramma sui traumi nascosti e le ferite invisibili che plasmano le relazioni e le vite delle persone."},
    {t:"17:20",title:"THE SEOUL GUARDIANS",syn:"Corea del Sud 2026 (Kim Jong-woo, Kim Shin-wan, Cho Chul-young). Copertura in diretta di un colpo di stato: il primo documentario in competizione nella storia del FEFF, sulla dichiarazione della legge marziale del dicembre 2024."},
    {t:"19:15",title:"KY NAM INN",syn:"Vietnam 2025 (Leon Le). Melodramma in stile vecchia Saigon: romantico e malinconico, ambientato negli ambienti d'epoca della città che fu, con tutta la sua poesia perduta."},
    {t:"21:55",title:"ROAD TO VENDETTA",syn:"Hong Kong 2025 (Njo Kui-ying). Un film d'azione tutto gas e stile: vendetta, onore e adrenalina pura nel genere action di Hong Kong ai suoi livelli migliori."}

// State
let currentUser = localStorage.getItem('feff28_user') || '';
let allVotes = {};   // { filmKey: { userName: stars } }
let currentDay = 0;
let synOpen = {};

const configured = JSONBIN_API_KEY !== 'JSONBIN_API_KEY' && JSONBIN_BIN_ID !== 'JSONBIN_BIN_ID';

function filmKey(dayIdx, filmIdx) { return `d${dayIdx}_f${filmIdx}`; }

// ─── Sync ───────────────────────────────────────────
function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

async function loadVotes() {
  if (!configured) { setSyncStatus('err','non configurato'); return; }
  // Mostra subito la cache locale, poi aggiorna in background
  const cached = localStorage.getItem('feff28_votes_cache');
  if (cached) { try { allVotes = JSON.parse(cached); renderAll(); } catch(e){} }
  setSyncStatus('loading','aggiornamento…');
  try {
    const r = await fetch(BASE_URL + '/latest', { headers: {'X-Master-Key': JSONBIN_API_KEY} });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    allVotes = data.record.votes || {};
    localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
    setSyncStatus('ok','sincronizzato');
    renderAll();
  } catch(e) {
    setSyncStatus('err','errore rete');
  }
}

async function saveVotes() {
  if (!configured) return;
  setSyncStatus('loading','salvataggio…');
  try {
    await fetch(BASE_URL, {
      method: 'PUT',
      headers: HEADERS,
      body: JSON.stringify({ votes: allVotes })
    });
    setSyncStatus('ok','salvato');
  } catch(e) {
    setSyncStatus('err','errore salvataggio');
  }
}

function refreshData() { loadVotes(); }

// ─── User ────────────────────────────────────────────
function setUser() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  currentUser = val;
  localStorage.setItem('feff28_user', val);
  showUserBadge();
  renderAll();
}
function changeUser() {
  currentUser = '';
  localStorage.removeItem('feff28_user');
  document.getElementById('userBadge').classList.remove('visible');
  document.getElementById('loginBar').style.display = 'flex';
  document.getElementById('nameInput').value = '';
}
function showUserBadge() {
  document.getElementById('loginBar').style.display = 'none';
  const badge = document.getElementById('userBadge');
  badge.classList.add('visible');
  document.getElementById('userAvatar').textContent = initials(currentUser);
  document.getElementById('userAvatar').style.background = avatarColor(currentUser);
  document.getElementById('userNameLabel').textContent = currentUser;
}

// ─── Rating ──────────────────────────────────────────
function rate(dayIdx, filmIdx, stars) {
  if (!currentUser) { showToast('Inserisci prima il tuo nome ↑'); return; }
  const key = filmKey(dayIdx, filmIdx);
  if (!allVotes[key]) allVotes[key] = {};
  const current = allVotes[key][currentUser] || 0;
  if (current === stars) {
    delete allVotes[key][currentUser];
    if (Object.keys(allVotes[key]).length === 0) delete allVotes[key];
  } else {
    allVotes[key][currentUser] = stars;
  }
  localStorage.setItem('feff28_votes_cache', JSON.stringify(allVotes));
  renderAll();
  saveVotes();
}

// ─── Event delegation (fixes iOS tap on re-rendered stars) ───
document.addEventListener('click', function(e) {
  const star = e.target.closest('[data-rate]');
  if (star) {
    rate(+star.dataset.day, +star.dataset.film, +star.dataset.rate);
    return;
  }
  const syn = e.target.closest('[data-syn]');
  if (syn) {
    toggleSyn(syn.dataset.syn);
  }
});

// ─── Render ───────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = films.map((d,i) =>
    `<div class="day-tab ${i===0?'active':''}" onclick="switchDay(${i})">${d.label}</div>`
  ).join('');
}

function switchDay(i) {
  currentDay = i;
  document.querySelectorAll('.day-tab').forEach((t,j) => t.classList.toggle('active', j===i));
  document.querySelectorAll('.day-section').forEach((s,j) => s.classList.toggle('active', j===i));
}

function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = films.map((day, di) => {
    const filmsHtml = day.films.map((f, fi) => {
      const key = filmKey(di, fi);
      const myRating = currentUser && allVotes[key] ? (allVotes[key][currentUser] || 0) : 0;
      const otherVotes = allVotes[key] ? Object.entries(allVotes[key]) : [];
      const starsHtml = [1,2,3,4,5].map(s =>
        `<span class="star ${myRating>=s?'on':''}" data-rate="${s}" data-day="${di}" data-film="${fi}">★</span>`
      ).join('');
      const otherHtml = otherVotes.length > 0 ? `<div class="votes-row">${
        otherVotes.map(([name,stars]) => `
          <div class="vote-chip">
            <div class="vote-chip-avatar" style="background:${avatarColor(name)}">${initials(name)}</div>
            <span class="vote-chip-name">${name.split(' ')[0]}</span>
            <span class="vote-chip-stars">${'★'.repeat(stars)}</span>
          </div>`).join('')
      }</div>` : '';
      const noteKey = `feff28_note_${currentUser}_${key}`;
      const noteVal = currentUser ? (localStorage.getItem(noteKey) || '') : '';
      const noteHtml = currentUser ? `
        <span class="note-label">nota personale</span>
        <textarea class="note-area" data-notekey="${noteKey}" placeholder="Solo tu puoi vedere questo…" rows="2">${noteVal}</textarea>` : '';
      const synKey = key;
      const synVisible = synOpen[synKey];
      return `<div class="film-card">
        <div class="film-main">
          <div class="film-time-col"><span class="film-time">${f.t}</span></div>
          <div class="film-body">
            <div class="film-title">${f.title}</div>
            ${f.syn ? `<div class="film-synopsis-preview ${synVisible?'open':''}" id="syn-${synKey}">${f.syn}</div>` : ''}
            <div class="film-actions">
              <div class="stars">${starsHtml}</div>
              ${f.syn ? `<button class="toggle-syn" data-syn="${synKey}">${synVisible?'nascondi ▲':'trama ▼'}</button>` : ''}
            </div>
            ${otherHtml}
            ${noteHtml}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="day-section ${di===currentDay?'active':''}" id="day-${di}">
      <div class="day-title">${day.day}</div>
      <div class="day-subtitle">Teatro Nuovo · Sala 2</div>
      ${filmsHtml}
    </div>`;
  }).join('');
}

function toggleSyn(key) {
  synOpen[key] = !synOpen[key];
  renderAll();
}

// ─── Notes (local only) ──────────────────────────────
document.addEventListener('input', function(e) {
  if (e.target.classList.contains('note-area') && e.target.dataset.notekey) {
    localStorage.setItem(e.target.dataset.notekey, e.target.value);
  }
});

// ─── Export ───────────────────────────────────────────
function exportText() {
  let txt = '🎬 FEFF 28 — Diario di visione\n';
  txt += 'Udine, 24 apr – 2 mag 2026\n\n';
  films.forEach((day, di) => {
    txt += `━━━ ${day.day} ━━━\n`;
    day.films.forEach((f, fi) => {
      const key = filmKey(di, fi);
      const votes = allVotes[key] || {};
      const myR = currentUser ? (votes[currentUser] || 0) : 0;
      const myStars = myR > 0 ? '★'.repeat(myR) + '☆'.repeat(5-myR) : '·····';
      const others = Object.entries(votes).filter(([n])=>n!==currentUser);
      const othersStr = others.length ? ' | ' + others.map(([n,s])=>`${n.split(' ')[0]} ${'★'.repeat(s)}`).join(', ') : '';
      const noteKey = `feff28_note_${currentUser}_${key}`;
      const note = currentUser ? (localStorage.getItem(noteKey) || '') : '';
      txt += `${f.t}  ${f.title}  ${myStars}${othersStr}\n`;
      if (note) txt += `    ✏ ${note}\n`;
    });
    txt += '\n';
  });
  navigator.clipboard.writeText(txt).then(() => showToast('Copiato negli appunti ✓'));
}

function exportCSV() {
  // Collect all voter names
  const voters = new Set();
  films.forEach((day, di) => day.films.forEach((f, fi) => {
    Object.keys(allVotes[filmKey(di,fi)] || {}).forEach(n => voters.add(n));
  }));
  const voterList = [...voters];

  const esc = v => `"${String(v).replace(/"/g,'""')}"`;
  const header = ['Giorno','Orario','Film', ...voterList.map(n => `Voto ${n}`)].map(esc).join(',');
  const rows = [];
  films.forEach((day, di) => {
    day.films.forEach((f, fi) => {
      const key = filmKey(di, fi);
      const votes = allVotes[key] || {};
      const votesCols = voterList.map(n => votes[n] || '');
      rows.push([day.day, f.t, f.title, ...votesCols].map(esc).join(','));
    });
  });
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'feff28_voti.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV scaricato ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Init ─────────────────────────────────────────────
if (!configured) document.getElementById('configNotice').classList.add('visible');
if (currentUser) showUserBadge();
buildNav();
renderAll();
loadVotes();
</script>
